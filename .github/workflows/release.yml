name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.27.0'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          architecture: x64

      - name: install dependencies
        run: flutter pub get

      - name: build macos
        run: flutter build macos --release

      - name: package dmg
        run: |
          brew install create-dmg
          cd build/macos/Build/Products/Release
          create-dmg \
            --volname "PortProcess" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "PortProcess-macos-universal.dmg" \
            "port_manager.app"

      - name: upload macos artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/macos/Build/Products/Release/PortProcess-macos-universal.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: install dependencies
        run: flutter pub get

      - name: build windows
        run: flutter build windows --release

      - name: install wix
        shell: pwsh
        run: |
          $wixUrl = "https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip"
          Invoke-WebRequest -Uri $wixUrl -OutFile wix.zip
          Expand-Archive -Path wix.zip -DestinationPath .\wix-toolset -Force

      - name: build msi
        shell: pwsh
        run: |
          $wixPath = ".\wix-toolset"
          $buildDir = "build\windows\x64\runner\Release"

          # Harvest files
          & "$wixPath\heat.exe" dir "$buildDir" -gg -sfrag -sreg -srd -dr INSTALLFOLDER -cg ProductComponents -out "wix\harvest.wxs"

          # Compile
          & "$wixPath\candle.exe" -arch x64 -dBuildDir="$buildDir" "wix\PortProcess.wxs" "wix\harvest.wxs" -o wix\

          # Link
          & "$wixPath\light.exe" -ext WixUIExtension -cultures:en-us "wix\PortProcess.wixobj" "wix\harvest.wixobj" -o "PortProcess-windows-x86_64.msi"

      - name: upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: PortProcess-windows-x86_64.msi

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter pub get

      - name: build linux
        run: flutter build linux --release

      - name: package linux
        run: |
          cd build/linux/x64/release/bundle
          tar czf "../PortProcess-linux-x86_64.tar.gz" *

      - name: upload linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: build/linux/x64/release/PortProcess-linux-x86_64.tar.gz

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: list artifacts
        run: ls -la artifacts/

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PortProcess-macos-universal.dmg
            artifacts/PortProcess-windows-x86_64.msi
            artifacts/PortProcess-linux-x86_64.tar.gz
          generate_release_notes: true
