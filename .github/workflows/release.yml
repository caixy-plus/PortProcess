name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.27.0'
  APP_NAME: PortProcess

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: get version
        id: get-version
        run: |
          VERSION=$(cat pubspec.yaml | grep '^version:' | sed 's/version: //g' | sed 's/+.*//g' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `${process.env.VERSION}`,
              name: `PortProcess ${process.env.VERSION}`,
              body: '🎉 Download the appropriate installer for your platform below.',
              draft: true,
              prerelease: false
            })
            return data.id

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          architecture: x64

      - name: install dependencies
        run: flutter pub get

      - name: build macos
        run: flutter build macos --release

      - name: package dmg
        run: |
          brew install create-dmg
          cd build/macos/Build/Products/Release
          create-dmg \
            --volname "PortProcess" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "PortProcess_${{ needs.create-release.outputs.version }}_macos_universal.dmg" \
            "port_manager.app"

      - name: upload macos asset
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const path = `build/macos/Build/Products/Release/PortProcess_${{ needs.create-release.outputs.version }}_macos_universal.dmg`
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              name: `PortProcess_${{ needs.create-release.outputs.version }}_macos_universal.dmg`,
              data: fs.readFileSync(path)
            })

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: install dependencies
        run: flutter pub get

      - name: build windows
        run: flutter build windows --release

      - name: build msi
        shell: pwsh
        run: |
          $version = "${{ needs.create-release.outputs.version }}"
          $wixPath = "C:\Program Files (x86)\WiX Toolset v3.11\bin"
          $buildDir = "build\windows\x64\runner\Release"
          $wxsFile = "wix\PortProcess.wxs"

          # Create wxs with heat
          & "$wixPath\heat.exe" dir "$buildDir" -gg -sfrag -sreg -srd -dr INSTALLFOLDER -cg ProductComponents -out "wix\harvest.wxs"

          # Compile
          & "$wixPath\candle.exe" -arch x64 -dVersion=$version -dBuildDir="$buildDir" "$wxsFile" "wix\harvest.wxs" -o wix\

          # Link
          & "$wixPath\light.exe" -ext WixUIExtension -cultures:en-us "wix\PortProcess.wixobj" "wix\harvest.wixobj" -o "PortProcess_${version}_windows_x86_64.msi"

      - name: upload windows asset
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const version = `${{ needs.create-release.outputs.version }}`
            const path = `PortProcess_${version}_windows_x86_64.msi`
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              name: `PortProcess_${version}_windows_x86_64.msi`,
              data: fs.readFileSync(path)
            })

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter pub get

      - name: build linux
        run: flutter build linux --release

      - name: package linux
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          cd build/linux/x64/release/bundle
          tar czf "../../../PortProcess_${VERSION}_linux_x86_64.tar.gz" *

      - name: upload linux asset
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const version = `${{ needs.create-release.outputs.version }}`
            const path = `build/linux/x64/release/PortProcess_${version}_linux_x86_64.tar.gz`
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              name: `PortProcess_${version}_linux_x86_64.tar.gz`,
              data: fs.readFileSync(path)
            })

  publish-release:
    runs-on: ubuntu-latest
    needs: [create-release, build-macos, build-windows, build-linux]
    if: always() && needs.create-release.result == 'success'
    steps:
      - name: publish release
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              prerelease: false
            })
