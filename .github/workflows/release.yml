name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.27.0'

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Install create-dmg
        run: |
          if ! command -v create-dmg &> /dev/null; then
            brew install create-dmg
          fi

      - name: Prepare and Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/Port Process.app"
          DMG_PATH="PortProcess-macos.dmg"

          # 移除所有扩展属性 (com.apple.quarantine 等)
          xattr -cr "$APP_PATH"

          # 确保二进制文件有执行权限
          chmod +x "$APP_PATH/Contents/MacOS/Port Process"

          # 使用 create-dmg 创建美观的 DMG
          create-dmg \
            --volname "PortProcess" \
            --window-pos 200 200 \
            --window-size 600 400 \
            --icon-size 80 \
            --icon "Port Process.app" 150 200 \
            --app-drop-link 450 200 \
            --hide-extension "Port Process.app" \
            --format UDZO \
            "$DMG_PATH" \
            "$APP_PATH"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: PortProcess-macos.dmg
          retention-days: 7

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        run: flutter build windows --release

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          if (!(Get-Command heat -ErrorAction SilentlyContinue)) {
            choco install wixtoolset -y
          }
          heat --help

      - name: Generate WiX components
        shell: pwsh
        run: |
          $buildDir = "build\windows\x64\runner\Release"
          if (!(Test-Path $buildDir)) { $buildDir = "build\windows\runner\Release" }

          heat dir "$buildDir" `
            -cg ProductComponents -gg -scom -sreg -sfrag -srd -dr INSTALLFOLDER `
            -out "wix\components.wxs"

      - name: Build MSI
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')

          candle -arch x64 -dVersion="$version" `
            "wix\PortProcess.wxs" "wix\components.wxs" `
            -out "wix\obj\"

          light -ext WixUIExtension `
            -cultures:en-us `
            "wix\obj\PortProcess.wixobj" "wix\obj\components.wixobj" `
            -out "PortProcess-windows.msi"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: PortProcess-windows.msi
          retention-days: 7

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    if: always() && needs.build-macos.result == 'success' && needs.build-windows.result == 'success'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release_dist

          # 1. macOS - 搜索 DMG
          find artifacts -name "PortProcess-macos.dmg" -exec cp {} release_dist/ \;

          # 2. Windows - 搜索 MSI
          find artifacts -name "PortProcess-windows.msi" -exec cp {} release_dist/ \;

          ls -la release_dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PortProcess ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release_dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
