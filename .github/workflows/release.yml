name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.27.0'

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Install create-dmg
        run: |
          if ! command -v create-dmg &> /dev/null; then
            brew install create-dmg
          fi

      - name: Prepare and Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/port_manager.app"
          DMG_PATH="PortProcess-macos.dmg"

          # 移除所有扩展属性 (com.apple.quarantine 等)
          xattr -cr "$APP_PATH"

          # 确保二进制文件有执行权限
          chmod +x "$APP_PATH/Contents/MacOS/port_manager"

          # 使用 create-dmg 创建美观的 DMG
          create-dmg \
            --volname "PortProcess" \
            --window-pos 200 200 \
            --window-size 600 400 \
            --icon-size 80 \
            --icon "port_manager.app" 150 200 \
            --app-drop-link 450 200 \
            --hide-extension "port_manager.app" \
            --format UDZO \
            "$DMG_PATH" \
            "$APP_PATH"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: PortProcess-macos.dmg
          retention-days: 7

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        run: flutter build windows --release

      - name: Build MSI with WiX v3
        shell: pwsh
        run: |
          # 下载 WiX v3
          $wixUrl = "https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip"
          Invoke-WebRequest -Uri $wixUrl -OutFile wix.zip
          Expand-Archive -Path wix.zip -DestinationPath .\wix-toolset -Force
          
          $wixPath = ".\wix-toolset"
          $version = "${{ github.ref_name }}".Replace("v","")
          
          # 确定构建目录
          $buildDir = "build\windows\x64\runner\Release"
          if (!(Test-Path $buildDir)) { $buildDir = "build\windows\runner\Release" }
          
          # 创建 wix 输出目录
          New-Item -ItemType Directory -Force -Path "wix\output"
          
          # 使用 heat 自动收集文件
          & "$wixPath\heat.exe" dir "$buildDir" -gg -sfrag -sreg -srd -dr INSTALLFOLDER -cg ProductComponents -out "wix\output\harvest.wxs"
          
          # 编译
          & "$wixPath\candle.exe" -arch x64 -dVersion="$version" -dBuildDir="$buildDir" "wix\PortProcess.wxs" "wix\output\harvest.wxs" -o "wix\output\\"
          
          # 链接
          & "$wixPath\light.exe" -ext WixUIExtension -cultures:en-us "wix\output\PortProcess.wixobj" "wix\output\harvest.wixobj" -o "PortProcess-windows.msi"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: PortProcess-windows.msi
          retention-days: 7

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux
        run: |
          cd build/linux/x64/release/bundle
          tar czf "../../PortProcess-linux-x86_64.tar.gz" *
          cd ../../..

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: build/linux/x64/release/PortProcess-linux-x86_64.tar.gz
          retention-days: 7

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    if: always() && needs.build-macos.result == 'success' && needs.build-windows.result == 'success' && needs.build-linux.result == 'success'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release_dist

          # 1. macOS - 搜索 DMG
          find artifacts -name "PortProcess-macos.dmg" -exec cp {} release_dist/ \;

          # 2. Windows - 搜索 MSI
          find artifacts -name "PortProcess-windows.msi" -exec cp {} release_dist/ \;

          # 3. Linux - 搜索 tar.gz
          find artifacts -name "PortProcess-linux-x86_64.tar.gz" -exec cp {} release_dist/ \;

          ls -la release_dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PortProcess ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release_dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
